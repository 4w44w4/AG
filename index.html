<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aguero Banks — The Return</title>
  <meta name="description" content="Aguero Banks · The Return (Eze Onyiko 👑) · Album 2026" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">

    <!-- ═══════════════════ HERO ═══════════════════ -->
    <div class="hero-poster">
      <img src="aguero.jpg" alt="Aguero Banks" class="hero-bg-img" />
      <div class="hero-overlay"></div>

      <div class="hero-title-block">
        <div class="hero-eyebrow">Aguero Banks</div>
        <h1 class="hero-title">THE<br>RETURN</h1>
        <div class="hero-subtitle">(Eze Onyiko 👑)</div>
      </div>

      <div class="hero-artifact-wrap">
        <div class="vault-door" id="vault-door"></div>
      </div>

      <div class="hero-scroll-cue" id="scroll-cue">
        <div class="scroll-line"></div>
        <span class="scroll-label">Listen Now</span>
      </div>
    </div>

    <!-- ═══════════════════ SHRINE / PLAYER ═══════════════════ -->
    <div class="shrine" id="shrine">
      <div class="shrine-glow"></div>

      <div class="shrine-eyebrow">— Album —</div>

      <div class="shrine-stage">
        <!-- Now Playing -->
        <div class="now-playing-bar">
          <div class="now-playing-title" id="now-playing-title"></div>
          <div class="now-playing-feat" id="now-playing-feat"></div>
          <div class="now-playing-meta" id="now-playing-meta"></div>
        </div>

        <!-- Waveform -->
        <div class="waveform-wrap" id="waveform-wrap"></div>

        <!-- Progress bar -->
        <div class="progress-wrap">
          <div class="progress-rail" id="progress-rail">
            <div class="progress-fill" id="progress-fill" style="width:0%"></div>
          </div>
          <div class="progress-times">
            <span id="progress-time-current">0:00</span>
            <span id="progress-time-total">3:47</span>
          </div>
        </div>

        <!-- Controls -->
        <div class="controls-wrap">
          <button class="ctrl-btn" id="btn-shuffle" title="Shuffle">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/>
              <polyline points="21 16 21 21 16 21"/><line x1="4" y1="4" x2="9" y2="9"/>
            </svg>
          </button>
          <button class="ctrl-btn" id="btn-prev" title="Previous">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/>
            </svg>
          </button>
          <button class="ctrl-btn ctrl-btn--play" id="btn-play">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
              <polygon points="5 3 19 12 5 21 5 3"/>
            </svg>
          </button>
          <button class="ctrl-btn" id="btn-next" title="Next">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/>
            </svg>
          </button>
          <button class="ctrl-btn" title="Repeat">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/>
              <polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="shrine-divider"></div>

      <!-- Tracklist -->
      <div class="tracklist-wrap">
        <div class="tracklist-heading">Tracklist</div>
        <ul class="track-list" id="track-list"></ul>
        <button class="tracklist-toggle" id="tracklist-toggle">
          <svg class="tracklist-toggle-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
          <span class="toggle-label">Show All 10 Tracks</span>
        </button>
      </div>

      <!-- Footer -->
      <div class="footer">
        <div class="footer-title">Aguero Banks</div>
        <div class="footer-sub">The Return · 2026</div>
        <div class="footer-links">
          <a href="#" class="footer-link">Spotify</a>
          <span class="footer-dot">·</span>
          <a href="#" class="footer-link">Apple Music</a>
          <span class="footer-dot">·</span>
          <a href="#" class="footer-link">YouTube</a>
        </div>
      </div>
    </div>

  </div>
  <script src="script.js"></script>
</body>
</html>
